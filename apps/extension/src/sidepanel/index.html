<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MissionPulse</title>
    <script>
      window.__missionPulseInitialShellReady = performance.now();
    </script>
    <style>
      body {
        margin: 0;
        background: #f5f5f4;
        color: #0c0a09;
        font-family:
          Geist,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .initial-shell {
        box-sizing: border-box;
        position: fixed;
        inset: 0;
        z-index: 9999;
        width: 100vw;
        min-height: 100vh;
        padding: 1rem;
        background: #f5f5f4;
      }

      .initial-card {
        border: 1px solid #f0efef;
        border-radius: 1rem;
        background: #ffffff;
        padding: 1.25rem;
      }

      .initial-eyebrow {
        color: #0b64e9;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .initial-line {
        border-radius: 0.75rem;
        background: #ececea;
      }
    </style>
  </head>
  <body class="bg-page-canvas text-text-primary">
    <div id="app">
      <div class="initial-shell" data-initial-shell data-testid="feed-scroll-container">
        <section class="initial-card">
          <p class="initial-eyebrow">MissionPulse</p>
          <div class="initial-line" style="width: 72%; height: 3rem; margin-top: 1rem"></div>
          <div
            class="initial-line"
            style="
              height: 2.5rem;
              margin-top: 1.5rem;
              background: #ffffff;
              border: 1px solid #f0efef;
            "
          ></div>
          <div
            style="
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 0.75rem;
              margin-top: 1rem;
            "
          >
            <div class="initial-line" style="height: 4rem"></div>
            <div class="initial-line" style="height: 4rem"></div>
            <div class="initial-line" style="height: 4rem"></div>
          </div>
        </section>
      </div>
    </div>
    <script>
      (() => {
        const app = document.getElementById('app');
        if (!app || !globalThis.chrome?.runtime?.sendMessage) {
          return;
        }

        const renderOnboardingShell = () => {
          app.innerHTML = `
            <div class="initial-shell" data-initial-shell>
              <section class="initial-card" style="margin-top: 4rem">
                <p class="initial-eyebrow">MissionPulse</p>
                <h1 style="margin: 0.75rem 0 0; font-size: 1.25rem; line-height: 1.2">
                  Configurez votre premier scan
                </h1>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 1.5rem">
                  <div class="initial-line" style="height: 4rem; background: #ffffff; border: 1px solid #f0efef"></div>
                  <div class="initial-line" style="height: 4rem; background: #ffffff; border: 1px solid #f0efef"></div>
                  <div class="initial-line" style="height: 4rem; background: #ffffff; border: 1px solid #f0efef"></div>
                </div>
                <div class="initial-line" style="height: 7rem; margin-top: 1.25rem; background: #ffffff; border: 1px solid #f0efef"></div>
              </section>
            </div>
          `;
        };

        if (window.__missionPulsePerfForceOnboardingShell) {
          renderOnboardingShell();
          return;
        }

        Promise.all([
          chrome.runtime.sendMessage({ type: 'GET_PROFILE' }),
          chrome.runtime.sendMessage({ type: 'GET_FIRST_SCAN_DONE' }),
          chrome.runtime.sendMessage({ type: 'GET_ONBOARDING_COMPLETED' }),
        ])
          .then(([profileResponse, firstScanResponse, onboardingResponse]) => {
            const hasProfile =
              profileResponse?.type === 'PROFILE_RESULT' && profileResponse.payload !== null;
            const firstScanDone =
              firstScanResponse?.type === 'FIRST_SCAN_DONE_RESULT' && firstScanResponse.payload;
            const onboardingCompleted =
              onboardingResponse?.type === 'ONBOARDING_COMPLETED_RESULT' &&
              onboardingResponse.payload;

            if (!hasProfile && !firstScanDone && !onboardingCompleted) {
              renderOnboardingShell();
            }
          })
          .catch(() => {});
      })();
    </script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
