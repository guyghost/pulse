<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="1000" cy="150" r="200" fill="#22D3EE" opacity="0.04"/>
  <circle cx="300" cy="600" r="180" fill="#F59E0B" opacity="0.04"/>

  <!-- Left: TJM Panel mockup -->
  <g transform="translate(60, 40)">
    <rect width="380" height="720" rx="20" fill="#1E293B" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Nav -->
    <rect x="16" y="16" width="348" height="48" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="80" y="46" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Feed</text>
    <text x="165" y="46" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#F8FAFC" font-weight="600">TJM</text>
    <text x="250" y="46" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#64748B" font-weight="500">Settings</text>

    <!-- TJM header -->
    <text x="32" y="100" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#3B82F6" font-weight="700" letter-spacing="1.5">ANALYSE TJM</text>
    <text x="32" y="130" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#F8FAFC" font-weight="700">Tendances marché</text>

    <!-- Stats row -->
    <g transform="translate(16, 150)">
      <rect width="108" height="70" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <text x="14" y="24" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#64748B" letter-spacing="1">MÉDIAN</text>
      <text x="14" y="52" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#22D3EE" font-weight="700">620€</text>

      <rect x="120" width="108" height="70" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <text x="134" y="24" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#64748B" letter-spacing="1">RANGE</text>
      <text x="134" y="52" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#F8FAFC" font-weight="600">500-750</text>

      <rect x="240" width="108" height="70" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <text x="254" y="24" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#64748B" letter-spacing="1">TREND</text>
      <text x="254" y="52" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#10B981" font-weight="600">↑ +3%</text>
    </g>

    <!-- Chart area -->
    <rect x="16" y="240" width="348" height="180" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="32" y="266" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#94A3B8" font-weight="600">TJM par stack (30 derniers jours)</text>
    <!-- Chart bars -->
    <rect x="50" y="350" width="40" height="50" rx="4" fill="#3B82F6" opacity="0.8"/>
    <text x="55" y="370" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#F8FAFC">620</text>
    <text x="52" y="410" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#64748B">React</text>

    <rect x="110" y="330" width="40" height="70" rx="4" fill="#22D3EE" opacity="0.8"/>
    <text x="115" y="350" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#F8FAFC">680</text>
    <text x="117" y="410" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#64748B">Vue</text>

    <rect x="170" y="310" width="40" height="90" rx="4" fill="#10B981" opacity="0.8"/>
    <text x="175" y="330" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#F8FAFC">720</text>
    <text x="173" y="410" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#64748B">AWS</text>

    <rect x="230" y="340" width="40" height="60" rx="4" fill="#F59E0B" opacity="0.8"/>
    <text x="235" y="360" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#F8FAFC">650</text>
    <text x="232" y="410" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#64748B">Java</text>

    <rect x="290" y="320" width="40" height="80" rx="4" fill="#EF4444" opacity="0.7"/>
    <text x="295" y="340" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#F8FAFC">700</text>
    <text x="290" y="410" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#64748B">Python</text>

    <!-- Source breakdown -->
    <rect x="16" y="440" width="348" height="120" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="32" y="466" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#94A3B8" font-weight="600">TJM moyen par source</text>

    <text x="32" y="496" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC">Free-Work</text>
    <text x="280" y="496" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#22D3EE" font-weight="600">610 €/j</text>

    <text x="32" y="520" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC">Collective</text>
    <text x="280" y="520" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#22D3EE" font-weight="600">680 €/j</text>

    <text x="32" y="544" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC">LeHibou</text>
    <text x="280" y="544" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#22D3EE" font-weight="600">640 €/j</text>
  </g>

  <!-- Right side: explanation -->
  <g transform="translate(520, 80)">
    <text x="0" y="0" font-family="Inter,system-ui,sans-serif" font-size="42" fill="#F8FAFC" font-weight="800" letter-spacing="-1">Analysez le marché</text>
    <text x="0" y="50" font-family="Inter,system-ui,sans-serif" font-size="42" fill="#F8FAFC" font-weight="800" letter-spacing="-1">des TJM</text>
    <text x="0" y="100" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#94A3B8">Négociez avec des données, pas au feeling.</text>

    <!-- Bullet points -->
    <g transform="translate(0, 160)">
      <circle cx="10" cy="6" r="4" fill="#22D3EE"/>
      <text x="28" y="12" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#F8FAFC" font-weight="500">Historique TJM par technologie</text>

      <circle cx="10" cy="46" r="4" fill="#10B981"/>
      <text x="28" y="52" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#F8FAFC" font-weight="500">Tendances à la hausse ou à la baisse</text>

      <circle cx="10" cy="86" r="4" fill="#F59E0B"/>
      <text x="28" y="92" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#F8FAFC" font-weight="500">Comparaison entre les plateformes</text>

      <circle cx="10" cy="126" r="4" fill="#3B82F6"/>
      <text x="28" y="132" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#F8FAFC" font-weight="500">Fourchette marché pour votre stack</text>
    </g>

    <!-- Quote block -->
    <g transform="translate(0, 350)">
      <rect width="600" height="80" rx="16" fill="rgba(34,211,238,0.05)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
      <text x="24" y="30" font-family="Inter,system-ui,sans-serif" font-size="24" fill="#22D3EE" opacity="0.5">"</text>
      <text x="44" y="35" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#94A3B8" font-style="italic">Le TJM médian React en Île-de-France est de 620€/j ce mois-ci,</text>
      <text x="44" y="55" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#94A3B8" font-style="italic">en hausse de 3% par rapport au mois dernier.</text>
    </g>
  </g>

  <g transform="translate(60, 750)">
    <text x="0" y="0" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#64748B">
      Mission<tspan fill="#22D3EE">Pulse</tspan> — Dashboard TJM
    </text>
  </g>
</svg>
