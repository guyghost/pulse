<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="640" cy="400" r="300" fill="#3B82F6" opacity="0.03"/>

  <!-- Center: Privacy & Architecture -->
  <g transform="translate(140, 80)">
    <text x="400" y="0" font-family="Inter,system-ui,sans-serif" font-size="42" fill="#F8FAFC" font-weight="800" letter-spacing="-1" text-anchor="middle">100% local. Zéro tracking.</text>
    <text x="400" y="50" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#94A3B8" text-anchor="middle">Vos données ne quittent jamais votre machine.</text>
  </g>

  <!-- Architecture diagram -->
  <g transform="translate(100, 200)">
    <!-- Your Browser box -->
    <rect width="1080" height="480" rx="24" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="24" y="36" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#64748B" font-weight="600" letter-spacing="1.5">VOTRE NAVIGATEUR</text>

    <!-- Extension box -->
    <rect x="40" y="60" width="460" height="380" rx="20" fill="rgba(34,211,238,0.04)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
    <text x="60" y="92" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#22D3EE" font-weight="700" letter-spacing="1">MISSIONPULSE</text>

    <!-- Components inside extension -->
    <rect x="70" y="115" width="180" height="60" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="100" y="140" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC" font-weight="600">Side Panel UI</text>
    <text x="100" y="158" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#64748B">Svelte 5 · TailwindCSS</text>

    <rect x="280" y="115" width="180" height="60" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="310" y="140" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC" font-weight="600">Service Worker</text>
    <text x="310" y="158" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#64748B">Scan · Scoring · Alarms</text>

    <rect x="70" y="195" width="180" height="60" rx="12" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="100" y="220" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#10B981" font-weight="600">Scoring Engine</text>
    <text x="100" y="238" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#64748B">Stack · TJM · Localisation</text>

    <rect x="280" y="195" width="180" height="60" rx="12" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
    <text x="310" y="220" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F59E0B" font-weight="600">Gemini Nano (IA)</text>
    <text x="310" y="238" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#64748B">Scoring sémantique local</text>

    <!-- Storage -->
    <rect x="70" y="280" width="390" height="50" rx="12" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
    <text x="100" y="310" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#3B82F6" font-weight="600">IndexedDB + chrome.storage.local</text>

    <rect x="70" y="350" width="390" height="35" rx="8" fill="rgba(16,185,129,0.06)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
    <text x="160" y="373" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#10B981" font-weight="500">✓ Toutes les données restent ici</text>

    <!-- Platforms box -->
    <rect x="560" y="60" width="480" height="180" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="580" y="92" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#64748B" font-weight="600" letter-spacing="1.5">PLATEFORMES (VOS SESSIONS)</text>

    <!-- Platform items -->
    <rect x="580" y="110" width="130" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="610" y="135" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC">Free-Work</text>

    <rect x="722" y="110" width="110" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="745" y="135" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC">LeHibou</text>

    <rect x="844" y="110" width="90" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="867" y="135" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC">Hiway</text>

    <rect x="946" y="110" width="78" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="953" y="135" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC">Collective</text>

    <rect x="580" y="162" width="120" height="40" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="598" y="187" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#F8FAFC">Cherry Pick</text>

    <!-- Arrow: Extension → Platforms -->
    <line x1="500" y1="155" x2="555" y2="155" stroke="#22D3EE" stroke-width="2" stroke-dasharray="6 3"/>
    <polygon points="555,150 565,155 555,160" fill="#22D3EE"/>
    <text x="505" y="145" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#22D3EE">fetch</text>

    <!-- "No server" zone -->
    <rect x="560" y="280" width="480" height="110" rx="20" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.15)" stroke-width="1" stroke-dasharray="6 3"/>
    <text x="700" y="320" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#EF4444" font-weight="700" text-anchor="middle">✕ Aucun serveur externe</text>
    <text x="700" y="345" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Pas de backend · Pas de base de données distante</text>
    <text x="700" y="368" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Pas de tracking · Pas d'analytiques</text>
  </g>

  <g transform="translate(100, 750)">
    <text x="0" y="0" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#64748B">
      Mission<tspan fill="#22D3EE">Pulse</tspan> — Architecture 100% locale
    </text>
  </g>
</svg>
