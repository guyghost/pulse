  <!-- Title -->
  <text x="220" y="100" font-family="Inter,system-ui,sans-serif" font-size="28" fill="#F8FAFC" font-weight="800" letter-spacing="-0.5" text-anchor="middle">Mission<tspan fill="#22D3EE">Pulse</tspan></text>
  <text x="220" y="135" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Votre radar freelance</text>

  <!-- Features row -->
  <g transform="translate(40, 170)">
    <rect width="108" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="54" y="26" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#22D3EE" font-weight="700" text-anchor="middle">5</text>
    <text x="54" y="44" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">plateformes</text>

    <rect x="120" width="108" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="174" y="26" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#10B981" font-weight="700" text-anchor="middle">IA</text>
    <text x="174" y="44" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">scoring local</text>

    <rect x="240" width="120" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="300" y="26" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#F59E0B" font-weight="700" text-anchor="middle">100%</text>
    <text x="300" y="44" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">local · gratuit</text>
