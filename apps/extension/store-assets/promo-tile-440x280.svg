<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" rx="0" fill="url(#bg)"/>
  <circle cx="380" cy="60" r="120" fill="#3B82F6" opacity="0.06"/>
  <circle cx="60" cy="240" r="80" fill="#10B981" opacity="0.05"/>

  <!-- Logo pulse line -->
  <polyline points="30,140 80,140 100,100 120,180 140,80 160,170 180,120 200,140 240,140"
