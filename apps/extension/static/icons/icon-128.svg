<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#0F172A"/>
  <!-- Subtle radar ring -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.15"/>
  <circle cx="64" cy="64" r="30" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.25"/>
  <!-- Pulse line — the signature heartbeat / mission detection signal -->
  <polyline
    points="18,64 38,64 46,44 54,84 64,38 74,78 82,52 90,64 110,64"
    fill="none"
    stroke="#22D3EE"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Center glow dot -->
  <circle cx="64" cy="38" r="4" fill="#22D3EE" opacity="0.9"/>
</svg>
