name: Feature request
description: Propose an improvement for MissionPulse
title: 'feat: '
labels: ['enhancement', 'needs-triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Extension
        - Landing
        - Dashboard
        - Connector
        - Documentation
        - CI/CD
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and security notes
      description: Mention new permissions, data storage, external APIs, or session/cookie usage.
