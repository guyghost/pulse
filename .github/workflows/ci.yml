name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.23.1'
  PNPM_VERSION: '10.32.1'
  PYTHON_VERSION: '3.14.5'

jobs:
  quality:
    name: Quality, unit tests and build
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - id: checkout
        name: Checkout exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: setup-pnpm
        name: Install pinned pnpm launcher
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: ${{ env.PNPM_VERSION }}

      - id: setup-node
        name: Install pinned Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - id: setup-python
        name: Install pinned Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: expose-pinned-python
        name: Expose pinned Python executable
        run: echo "PULSE_RELEASE_PYTHON=$(command -v python3)" >> "$GITHUB_ENV"

      - id: verify-toolchain
        name: Verify the committed package manager authority
        run: |
          corepack enable
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(pnpm --version)" = "${PNPM_VERSION}"
          test "$(node -p 'require("./package.json").packageManager')" = "pnpm@10.32.1+sha512.a706938f0e89ac1456b6563eab4edf1d1faf3368d1191fc5c59790e96dc918e4456ab2e67d613de1043d2e8c81f87303e6b40d4ffeca9df15ef1ad567348f2be"

      - id: install
        name: Install exact committed dependencies
        run: pnpm install --frozen-lockfile

      - id: install-browser
        name: Install Chromium
        run: pnpm --filter @pulse/extension exec playwright install --with-deps chromium

      - id: format
        name: Check formatting
        run: pnpm turbo format:check

      - id: lint
        name: Run static lint
        run: pnpm turbo lint

      - id: typecheck
        name: Run TypeScript checks
        run: pnpm turbo typecheck

      - id: unit
        name: Run unit and integration tests
        run: pnpm turbo test

      - id: compile
        name: Build all production packages
        run: pnpm turbo build

      - id: manifest
        name: Verify the built extension manifest
        run: pnpm --filter @pulse/extension verify-manifest dist/manifest.json --post-build

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: quality
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - id: checkout
        name: Checkout exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: setup-pnpm
        name: Install pinned pnpm launcher
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: ${{ env.PNPM_VERSION }}

      - id: setup-node
        name: Install pinned Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - id: verify-toolchain
        name: Verify the exact toolchain
        run: |
          corepack enable
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(pnpm --version)" = "${PNPM_VERSION}"

      - id: install
        name: Install exact committed dependencies
        run: pnpm install --frozen-lockfile

      - id: install-browser
        name: Install Chromium
        run: pnpm --filter @pulse/extension exec playwright install --with-deps chromium

      - id: test-browser
        name: Run browser E2E scenarios
        run: pnpm --filter @pulse/extension test:e2e

  test-mv3:
    name: Packaged MV3 gate
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: quality
    permissions:
      contents: read
    steps:
      - id: checkout
        name: Checkout exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: setup-pnpm
        name: Install pinned pnpm launcher
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: ${{ env.PNPM_VERSION }}

      - id: setup-node
        name: Install pinned Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - id: verify-toolchain
        name: Verify the exact toolchain
        run: |
          corepack enable
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(pnpm --version)" = "${PNPM_VERSION}"

      - id: setup-python
        name: Install pinned Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - id: expose-pinned-python
        name: Expose pinned Python executable
        run: echo "PULSE_RELEASE_PYTHON=$(command -v python3)" >> "$GITHUB_ENV"

      - id: install
        name: Install exact committed dependencies
        run: pnpm install --frozen-lockfile

      - id: install-browser
        name: Install Chromium
        run: pnpm --filter @pulse/extension exec playwright install --with-deps chromium

      - id: test-mv3
        name: Run all committed packaged MV3 scenarios
        run: pnpm --filter @pulse/extension test:mv3

      - id: upload-mv3-evidence
        name: Upload MV3 Playwright evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: missionpulse-mv3-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: output/playwright/
          if-no-files-found: error
          overwrite: false
          retention-days: 14

  seal-candidate:
    name: Build, exercise and seal one exact candidate
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - id: checkout
        name: Checkout exact candidate source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - id: setup-pnpm
        name: Install pinned pnpm launcher
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: ${{ env.PNPM_VERSION }}

      - id: setup-node
        name: Install pinned Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - id: verify-toolchain
        name: Verify the committed package manager authority
        run: |
          corepack enable
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(pnpm --version)" = "${PNPM_VERSION}"
          test "$(node -p 'require("./package.json").packageManager')" = "pnpm@10.32.1+sha512.a706938f0e89ac1456b6563eab4edf1d1faf3368d1191fc5c59790e96dc918e4456ab2e67d613de1043d2e8c81f87303e6b40d4ffeca9df15ef1ad567348f2be"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - id: install
        name: Install exact committed dependencies
        run: pnpm install --frozen-lockfile

      - id: build
        name: Build, exercise, authorize and capture the sealed transport
        run: |
          "$GITHUB_WORKSPACE/node_modules/.bin/tsx" \
            "$GITHUB_WORKSPACE/apps/extension/scripts/build-sealed-candidate-transport.ts" \
            --output "$RUNNER_TEMP/missionpulse-sealed-candidate" \
            --github-output "$GITHUB_OUTPUT"

      - id: attest
        name: Attest the captured transport digest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-name: missionpulse-sealed-candidate
          subject-digest: sha256:${{ steps.build.outputs.transport-sha256 }}

      - id: upload
        name: Upload the exact attested transport bytes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: missionpulse-sealed-candidate
          path: ${{ steps.build.outputs.transport-path }}
          archive: false
          overwrite: false
          retention-days: 30

      - id: verify-upload-digest
        name: Verify the uploaded transport digest
        shell: bash
        env:
          CAPTURED_TRANSPORT_SHA256: ${{ steps.build.outputs.transport-sha256 }}
          UPLOADED_ARTIFACT_SHA256: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          [[ "$CAPTURED_TRANSPORT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$UPLOADED_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$UPLOADED_ARTIFACT_SHA256" == "$CAPTURED_TRANSPORT_SHA256" ]]
