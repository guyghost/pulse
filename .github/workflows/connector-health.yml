name: Connector Health

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: connector-health-${{ github.repository }}
  cancel-in-progress: false

jobs:
  health-capture:
    name: Capture connector health evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      captureTerminal: ${{ steps.finalize-capture.outputs.captureTerminal }}
      issueAdmission: ${{ steps.finalize-capture.outputs.issueAdmission }}
      disposition: ${{ steps.finalize-capture.outputs.disposition }}
      failureFingerprint: ${{ steps.finalize-capture.outputs.failureFingerprint }}
      evidenceFileSha256: ${{ steps.finalize-capture.outputs.evidenceFileSha256 }}
      artifactId: ${{ steps.finalize-capture.outputs.artifactId }}
      artifactArchiveSha256: ${{ steps.finalize-capture.outputs.artifactArchiveSha256 }}
    steps:
      - id: capture-checkout
        name: Checkout exact capture source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - id: capture-pnpm
        name: Setup exact pnpm for capture
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.32.1

      - id: capture-node
        name: Setup exact Node.js for capture
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - id: verify-capture-source
        name: Verify exact capture source identity
        working-directory: apps/extension
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_REPOSITORY: ${{ github.event.repository.full_name }}
        run: node --experimental-strip-types scripts/connector-health/verify-source-cli.ts

      - id: install-capture-dependencies
        name: Install frozen capture dependency graph
        run: pnpm install --frozen-lockfile

      - id: capture-evidence
        name: Capture bounded fixture-only evidence
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_REPOSITORY: ${{ github.event.repository.full_name }}
        run: pnpm --filter @pulse/extension exec tsx scripts/connector-health/capture.ts

      - id: upload-evidence
        name: Upload exact connector health evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: connector-health-report
          path: apps/extension/output/connector-health/connector-health-evidence.v1.json
          if-no-files-found: error
          overwrite: false
          retention-days: 14

      - id: finalize-capture
        name: Confirm artifact and finalize capture actor
        if: always() && steps.capture-evidence.outcome == 'success'
        env:
          CAPTURE_DISPOSITION: ${{ steps.capture-evidence.outputs.disposition }}
          CAPTURE_FAILURE_FINGERPRINT: ${{ steps.capture-evidence.outputs.failureFingerprint }}
          CAPTURE_EVIDENCE_FILE_SHA256: ${{ steps.capture-evidence.outputs.evidenceFileSha256 }}
          CAPTURE_SNAPSHOT_SHA256: ${{ steps.capture-evidence.outputs.captureSnapshotSha256 }}
          UPLOADED_ARTIFACT_ID: ${{ steps.upload-evidence.outputs.artifact-id }}
          UPLOADED_ARTIFACT_ARCHIVE_SHA256: ${{ steps.upload-evidence.outputs.artifact-digest }}
          UPLOAD_OUTCOME: ${{ steps.upload-evidence.outcome }}
        run: pnpm --filter @pulse/extension exec tsx scripts/connector-health/capture-finalize-cli.ts

  issue-writer:
    name: Settle connector health issue
    needs: health-capture
    if: >-
      needs.health-capture.outputs.issueAdmission == 'admitted' &&
      needs.health-capture.outputs.captureTerminal != '' &&
      needs.health-capture.outputs.disposition != '' &&
      needs.health-capture.outputs.failureFingerprint != '' &&
      needs.health-capture.outputs.evidenceFileSha256 != '' &&
      needs.health-capture.outputs.artifactId != '' &&
      needs.health-capture.outputs.artifactArchiveSha256 != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      issues: write
    outputs:
      issueTerminal: ${{ steps.settle-issue.outputs.issueTerminal }}
    steps:
      - id: writer-checkout
        name: Checkout exact issue writer source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - id: writer-pnpm
        name: Setup exact pnpm for writer
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.32.1

      - id: writer-node
        name: Setup exact Node.js for writer
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - id: verify-writer-source
        name: Verify exact writer source identity
        working-directory: apps/extension
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_REPOSITORY: ${{ github.event.repository.full_name }}
        run: node --experimental-strip-types scripts/connector-health/verify-source-cli.ts

      - id: install-writer-dependencies
        name: Install frozen writer dependency graph
        run: pnpm install --frozen-lockfile

      - id: download-evidence
        name: Download exact current-run artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          artifact-ids: ${{ needs.health-capture.outputs.artifactId }}
          path: apps/extension/output/connector-health
          merge-multiple: false

      - id: settle-issue
        name: Reverify evidence and run issue actor
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_REPOSITORY: ${{ github.event.repository.full_name }}
          EXPECTED_ARTIFACT_ID: ${{ needs.health-capture.outputs.artifactId }}
          EXPECTED_ARTIFACT_ARCHIVE_SHA256: ${{ needs.health-capture.outputs.artifactArchiveSha256 }}
          EXPECTED_EVIDENCE_FILE_SHA256: ${{ needs.health-capture.outputs.evidenceFileSha256 }}
          EXPECTED_FAILURE_FINGERPRINT: ${{ needs.health-capture.outputs.failureFingerprint }}
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm --filter @pulse/extension exec tsx scripts/connector-health/issue-writer.ts

  conclusion:
    name: Conclude connector health workflow
    needs: [health-capture, issue-writer]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - id: conclusion-checkout
        name: Checkout exact conclusion source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - id: conclusion-pnpm
        name: Setup exact pnpm for conclusion
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.32.1

      - id: conclusion-node
        name: Setup exact Node.js for conclusion
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - id: verify-conclusion-source
        name: Verify exact conclusion source identity
        working-directory: apps/extension
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_REPOSITORY: ${{ github.event.repository.full_name }}
        run: node --experimental-strip-types scripts/connector-health/verify-source-cli.ts

      - id: install-conclusion-dependencies
        name: Install frozen conclusion dependency graph
        run: pnpm install --frozen-lockfile

      - id: conclude-workflow
        name: Start committed conclusion actor and conclude
        env:
          CAPTURE_RESULT: ${{ needs.health-capture.result }}
          CAPTURE_TERMINAL: ${{ needs.health-capture.outputs.captureTerminal }}
          ISSUE_RESULT: ${{ needs.issue-writer.result }}
          ISSUE_TERMINAL: ${{ needs.issue-writer.outputs.issueTerminal }}
        run: pnpm --filter @pulse/extension exec tsx scripts/connector-health/conclusion-cli.ts
