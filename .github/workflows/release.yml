name: Release candidate packaging

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: 'Exact clean commit named by the tested-dist seal'
        required: true
        type: string
      expected_version:
        description: 'Committed extension version (for example 0.2.2)'
        required: true
        type: string
      evidence_run_id:
        description: 'Actions run containing the sealed-candidate evidence artifact'
        required: true
        type: string
permissions:
  actions: read
  contents: read

concurrency:
  group: release-candidate-${{ inputs.expected_version }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22.23.1'
  PNPM_VERSION: '10.32.1'
  PYTHON_VERSION: '3.14.5'

jobs:
  package-validated:
    name: Package an already sealed candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      artifact_name: ${{ steps.package-metadata.outputs.artifact_name }}
      zip_sha256: ${{ steps.package-metadata.outputs.zip_sha256 }}

    steps:
      - name: Checkout the sealed source commit
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup pinned Python descriptor helper
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Bind the pinned Python executable
        run: echo "PULSE_RELEASE_PYTHON=$(command -v python3)" >> "$GITHUB_ENV"

      # Tooling is installed before the immutable seal is ingested. From the
      # download step onward this job is package-only.
      - name: Install committed tooling
        run: pnpm install --frozen-lockfile

      - name: Verify committed source version
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          EXPECTED_COMMIT: ${{ inputs.source_commit }}
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          pnpm --filter @pulse/extension verify-manifest --expected-version "$EXPECTED_VERSION"

      - name: Verify successful seal-candidate run provenance
        uses: actions/github-script@v8
        env:
          EVIDENCE_RUN_ID: ${{ inputs.evidence_run_id }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        with:
          script: |
            const runId = Number(process.env.EVIDENCE_RUN_ID)
            if (!Number.isSafeInteger(runId) || runId < 1) core.setFailed('Invalid evidence_run_id')
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            })
            if (run.data.conclusion !== 'success') core.setFailed('Evidence run is not successful')
            if (run.data.head_sha !== process.env.SOURCE_COMMIT) core.setFailed('Evidence commit mismatch')
            const workflow = await github.rest.actions.getWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: run.data.workflow_id,
            })
            if (workflow.data.path !== '.github/workflows/ci.yml') {
              core.setFailed('Evidence run did not originate from .github/workflows/ci.yml')
            }

      - name: Download sealed candidate evidence
        uses: actions/download-artifact@v8
        with:
          name: missionpulse-sealed-candidate
          path: ${{ github.workspace }}/release-input
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.evidence_run_id }}

      - name: Verify sealed evidence identity
        env:
          EXPECTED_COMMIT: ${{ inputs.source_commit }}
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const seal = JSON.parse(readFileSync(process.env.GITHUB_WORKSPACE + "/release-input/tested-dist-seal.json", "utf8"));
            if (seal.sourceCommit !== process.env.EXPECTED_COMMIT) process.exit(1);
            if (seal.committedVersion !== process.env.EXPECTED_VERSION) process.exit(1);
            if (seal.worktreeCleanBeforeGate !== true || seal.worktreeCleanAfterGate !== true) process.exit(1);
          '
          test -f "$GITHUB_WORKSPACE/release-input/dist/manifest.json"

      - name: Package the sealed dist
        env:
          VERSION: ${{ inputs.expected_version }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          ARTIFACT_ID="artifact-${VERSION}-${SOURCE_COMMIT:0:12}"
          JOURNAL_ID="journal-${VERSION}-${SOURCE_COMMIT:0:12}"
          "$GITHUB_WORKSPACE/node_modules/.bin/tsx" "$GITHUB_WORKSPACE/apps/extension/scripts/package-sealed-dist.ts" \
            --seal "$GITHUB_WORKSPACE/release-input/tested-dist-seal.json" \
            --dist "$GITHUB_WORKSPACE/release-input/dist" \
            --releases "$GITHUB_WORKSPACE/apps/extension/releases" \
            --artifact-id "$ARTIFACT_ID" \
            --journal-id "$JOURNAL_ID" > "$GITHUB_WORKSPACE/package-artifact.json"

      - name: Verify package immediately before upload
        env:
          VERSION: ${{ inputs.expected_version }}
        run: |
          ZIP_SHA256=$(node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const artifact = JSON.parse(readFileSync(process.env.GITHUB_WORKSPACE + "/package-artifact.json", "utf8"));
            process.stdout.write(artifact.zip.zipSha256);
          ')
          "$GITHUB_WORKSPACE/node_modules/.bin/tsx" "$GITHUB_WORKSPACE/apps/extension/scripts/verify-release-artifact.ts" \
            --bundle "$GITHUB_WORKSPACE/apps/extension/releases/v${VERSION}" \
            --zip "$GITHUB_WORKSPACE/apps/extension/releases/v${VERSION}/missionpulse.zip" \
            --checksum "$GITHUB_WORKSPACE/apps/extension/releases/v${VERSION}/missionpulse.zip.sha256" \
            --validation "$GITHUB_WORKSPACE/apps/extension/releases/v${VERSION}/validation.json" \
            --extract-fresh "$GITHUB_WORKSPACE/consumer-check-before-upload" \
            --expected-sha256 "$ZIP_SHA256"

      - name: Read package metadata
        id: package-metadata
        env:
          VERSION: ${{ inputs.expected_version }}
        run: |
          ZIP_SHA256=$(node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const artifact = JSON.parse(readFileSync(process.env.GITHUB_WORKSPACE + "/package-artifact.json", "utf8"));
            process.stdout.write(artifact.zip.zipSha256);
          ')
          echo "zip_sha256=$ZIP_SHA256" >> "$GITHUB_OUTPUT"
          echo "artifact_name=missionpulse-package-validated-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload package_validated evidence
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package-metadata.outputs.artifact_name }}
          path: |
            apps/extension/releases/v${{ inputs.expected_version }}/
            apps/extension/releases/.v${{ inputs.expected_version }}.*.journal.jsonl
            release-input/tested-dist-seal.json
            package-artifact.json
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true

  consumer-verify:
    name: Verify downloaded package bytes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: package-validated

    steps:
      - name: Checkout verifier at the sealed source commit
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_commit }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup pinned Python descriptor helper
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Bind the pinned Python executable
        run: echo "PULSE_RELEASE_PYTHON=$(command -v python3)" >> "$GITHUB_ENV"

      - name: Install committed verifier
        run: pnpm install --frozen-lockfile

      - name: Download package_validated evidence
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.package-validated.outputs.artifact_name }}
          path: ${{ github.workspace }}/consumer-input

      - name: Verify release artifact at consumer boundary
        env:
          VERSION: ${{ inputs.expected_version }}
          EXPECTED_ZIP_SHA256: ${{ needs.package-validated.outputs.zip_sha256 }}
        run: |
          "$GITHUB_WORKSPACE/node_modules/.bin/tsx" "$GITHUB_WORKSPACE/apps/extension/scripts/verify-release-artifact.ts" \
            --bundle "$GITHUB_WORKSPACE/consumer-input/apps/extension/releases/v${VERSION}" \
            --zip "$GITHUB_WORKSPACE/consumer-input/apps/extension/releases/v${VERSION}/missionpulse.zip" \
            --checksum "$GITHUB_WORKSPACE/consumer-input/apps/extension/releases/v${VERSION}/missionpulse.zip.sha256" \
            --validation "$GITHUB_WORKSPACE/consumer-input/apps/extension/releases/v${VERSION}/validation.json" \
            --extract-fresh "$GITHUB_WORKSPACE/consumer-extracted" \
            --expected-sha256 "$EXPECTED_ZIP_SHA256"

      - name: Record local-only release boundary
        run: echo "package_validated; no Store submission or deployment state is claimed"
