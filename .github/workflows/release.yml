name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.32.1'

jobs:
  build-and-release:
    name: Build & Release Extension
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Run TypeScript checks
        run: pnpm turbo typecheck

      - name: Run tests
        run: pnpm turbo test

      - name: Bump version in files
        run: pnpm --filter @pulse/extension bump-version ${{ steps.version.outputs.version }}

      - name: Build extension
        run: pnpm turbo build

      - name: Verify built manifest.json
        run: pnpm --filter @pulse/extension verify-manifest apps/extension/dist/manifest.json

      - name: Create extension ZIP
        run: |
          cd apps/extension/dist
          zip -r ../missionpulse-${{ steps.version.outputs.version }}.zip .

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to ${{ github.ref_name }}"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD 2>/dev/null || echo "- Release ${{ steps.version.outputs.version }}")
          else
            echo "First release, generating initial changelog"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -10 || echo "- Initial release")
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MissionPulse v${{ steps.version.outputs.version }}
          body: |
            ## MissionPulse v${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Installation
            Download `missionpulse-${{ steps.version.outputs.version }}.zip` and load it as an unpacked extension in Chrome.

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.ref_name }}...HEAD
          files: |
            apps/extension/missionpulse-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload extension ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: missionpulse-zip-${{ steps.version.outputs.version }}
          path: apps/extension/missionpulse-${{ steps.version.outputs.version }}.zip
          retention-days: 30

  publish-to-chrome-store:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-release
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Download extension ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: missionpulse-zip-${{ needs.build-and-release.outputs.version }}
          path: apps/extension/

      - name: Publish to Chrome Web Store
        if: ${{ env.CHROME_EXTENSION_ID != '' }}
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: apps/extension/missionpulse-${{ needs.build-and-release.outputs.version }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}

      - name: Publish notification
        if: ${{ env.CHROME_EXTENSION_ID == '' }}
        run: |
          echo "::warning::Chrome Web Store credentials not configured. Skipping CWS publish."
          echo "To enable Chrome Web Store publishing, configure the following secrets:"
          echo "  - CHROME_EXTENSION_ID"
          echo "  - CHROME_CLIENT_ID"
          echo "  - CHROME_CLIENT_SECRET"
          echo "  - CHROME_REFRESH_TOKEN"
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
